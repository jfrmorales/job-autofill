<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <style>
    body { font: 13px system-ui, sans-serif; width: 300px; margin: 0; padding: 12px; }
    h1 { font-size: 14px; margin: 0 0 8px; }
    button { width: 100%; padding: 9px; margin: 4px 0; border: 0; border-radius: 6px;
             font-size: 13px; cursor: pointer; }
    #fill { background: #2b6cb0; color: #fff; font-weight: 600; }
    #fill:disabled { background: #a0aec0; cursor: default; }
    .sec { background: #edf2f7; }
    #status { margin-top: 8px; font-size: 12px; white-space: pre-wrap; color: #2d3748; min-height: 16px; }
    a { color: #2b6cb0; font-size: 12px; }
    .row { display: flex; gap: 6px; }
    .row button { width: auto; flex: 1; }
    #last { margin-top: 6px; font-size: 12px; }
    #last .head { font-weight: 600; }
    #last .fields { margin-top: 4px; max-height: 160px; overflow: auto; }
    #last .fields div { padding: 1px 0; }
    #log { margin-top: 6px; max-height: 180px; overflow: auto; font: 11px ui-monospace, monospace;
           white-space: pre-wrap; background: #1a202c; color: #e2e8f0; padding: 8px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1 data-i18n="app_title">job-autofill</h1>
  <button id="fill" data-i18n="btn_fill">⚡ Rellenar con IA</button>
  <div class="row">
    <button id="cvdl" class="sec" data-i18n="btn_cvdl">⬇ CV a Descargas</button>
    <button id="cvcopy" class="sec" data-i18n="btn_cvcopy">📋 Copiar CV</button>
  </div>
  <div class="row">
    <button id="scan" class="sec" data-i18n="btn_scan">Solo escanear</button>
    <button id="opts" class="sec" data-i18n="btn_opts">Ajustes</button>
  </div>
  <div id="status"></div>
  <div id="last"></div>
  <div class="row">
    <button id="togglelog" class="sec" data-i18n="btn_showlog">Ver registro</button>
    <button id="copylog" class="sec" data-i18n="btn_copylog">📋 Copiar registro</button>
  </div>
  <div id="log" style="display:none"></div>
  <p style="margin:8px 0 0"><small data-i18n-html="popup_footer">Revisa, adjunta el CV y <b>envía tú</b>. La extensión nunca envía.</small></p>
  <script src="i18n.js"></script>
  <script src="providers.js"></script>
  <script src="popup.js"></script>
</body>
</html>
