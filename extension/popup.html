<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <style>
    body { font: 13px system-ui, sans-serif; width: 300px; margin: 0; padding: 12px; }
    h1 { font-size: 14px; margin: 0 0 8px; }
    button { width: 100%; padding: 9px; margin: 4px 0; border: 0; border-radius: 6px;
             font-size: 13px; cursor: pointer; }
    #fill { background: #2b6cb0; color: #fff; font-weight: 600; }
    #fill:disabled { background: #a0aec0; cursor: default; }
    .sec { background: #edf2f7; }
    #status { margin-top: 8px; font-size: 12px; white-space: pre-wrap; color: #2d3748; min-height: 16px; }
    a { color: #2b6cb0; font-size: 12px; }
    .row { display: flex; gap: 6px; }
    .row button { width: auto; flex: 1; }
  </style>
</head>
<body>
  <h1>job-autofill</h1>
  <button id="fill">⚡ Rellenar con IA</button>
  <div class="row">
    <button id="cvdl" class="sec">⬇ CV a Descargas</button>
    <button id="cvcopy" class="sec">📋 Copiar CV</button>
  </div>
  <div class="row">
    <button id="scan" class="sec">Solo escanear</button>
    <button id="opts" class="sec">Ajustes</button>
  </div>
  <div id="status"></div>
  <p style="margin:8px 0 0"><small>Revisa, adjunta el CV y <b>envía tú</b>. La extensión nunca envía.</small></p>
  <script src="popup.js"></script>
</body>
</html>
